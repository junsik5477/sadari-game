<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리모트 사다리 타기 게임</title>
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
    <div id="app">
        <!-- 초기 화면 -->
        <div id="initial-screen" class="screen active">
            <h1>🎮 리모트 사다리 타기</h1>
            <p>친구들과 함께 즐기는 실시간 사다리 게임!</p>
            <button id="create-room-btn" class="btn primary">방 만들기</button>
            <div class="join-section">
                <input type="text" id="room-id-input" placeholder="방 ID 입력">
                <input type="text" id="player-name-input" placeholder="닉네임 입력">
                <button id="join-room-btn" class="btn secondary">참가하기</button>
            </div>
        </div>

        <!-- 대기실 화면 -->
        <div id="lobby-screen" class="screen">
            <div class="header">
                <h2>대기실</h2>
                <div id="room-info">
                    <span>방 ID: <span id="display-room-id"></span></span>
                    <button id="copy-link-btn" class="btn small">링크 복사</button>
                </div>
            </div>
            
            <div class="participants-section">
                <h3>참여자 목록</h3>
                <ul id="participants-list"></ul>
            </div>

            <div id="host-controls" class="host-controls hidden">
                <h3>목적지 설정 (벌칙/선물)</h3>
                <div class="destination-input">
                    <input type="text" id="destination-input" placeholder="벌칙 또는 선물 입력">
                    <button id="add-destination-btn" class="btn secondary">추가</button>
                </div>
                <ul id="destinations-list"></ul>
                <button id="start-game-btn" class="btn primary large">게임 시작</button>
            </div>

            <div id="waiting-message" class="waiting-message">
                <p>호스트가 목적지를 설정하고 게임을 시작할 때까지 기다려주세요.</p>
            </div>
        </div>

        <!-- 게임 화면 -->
        <div id="game-screen" class="screen">
            <h2>사다리 타기 진행 중...</h2>
            <div id="ladder-container">
                <canvas id="ladder-canvas"></canvas>
            </div>
            <button id="show-result-btn" class="btn primary large hidden">결과 보기</button>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="screen">
            <h2>🎉 게임 결과 🎉</h2>
            <div id="results-list"></div>
            <button id="new-game-btn" class="btn primary">새 게임 하기</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
